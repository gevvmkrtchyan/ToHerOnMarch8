<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Happy March 8 ❤️</title>
<style>
/* Smaller sizes for desktop and mobile */

body{
margin:0;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#ff8fb1,#ffc0cb);
font-family:Arial;
overflow:hidden;
transition:background 0.8s;
padding:20px;
}

/* floating hearts */

.heart{
position:absolute;
color:#ff4d6d;
animation:float 6s linear infinite;
pointer-events:none;
}

@keyframes float{
0%{transform:translateY(100vh)}
100%{transform:translateY(-10vh)}
}

/* container */

.container{
width:100%;
max-width:400px;
padding:40px 35px;
border-radius:25px;
background:white;
text-align:center;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
transition:0.4s;
}

.container.success{
transform:scale(1.05);
}

/* titles */

h2{
margin:0 0 8px 0;
font-size:24px;
}

p{
margin:0 0 18px 0;
font-size:14px;
color:#555;
}

/* input */

/* Input field responsive fix */

input{
width:100%;
max-width:100%;
box-sizing:border-box; /* ensures padding stays inside the container */
padding:14px;
font-size:16px;
border-radius:12px;
border:1px solid #ccc;
margin-bottom:12px;
text-align:center;
}

/* button */

button{
width:100%;
padding:14px;
font-size:16px;
border:none;
border-radius:12px;
background:#ff4d6d;
color:white;
cursor:pointer;
margin-top:5px;
}

/* shake animation */

.shake{
animation:shake 0.4s;
}

@keyframes shake{
0%{transform:translateX(0)}
25%{transform:translateX(-5px)}
50%{transform:translateX(5px)}
75%{transform:translateX(-5px)}
100%{transform:translateX(0)}
}

/* message */

#message{
margin-top:15px;
font-weight:bold;
font-size:14px;
}

/* Responsive mobile adjustments */

@media (max-width:480px){
.container{
padding:45px 30px;
}
h2{
font-size:26px;
}
p{
font-size:15px;
}
input{
font-size:18px;
padding:16px;
}
button{
font-size:18px;
padding:16px;
}
#message{
font-size:15px;
}
}
</style>
</head>

<body>

<div class="container" id="box">

<h2>Happy March 8 🌷</h2>
<p>Enter the nickname I call you</p>

<input id="nickname" placeholder="Type nickname">

<button onclick="checkName()">Open</button>

<div id="message"></div>

</div>

<script>

/* floating hearts */

setInterval(()=>{
const heart=document.createElement("div")
heart.className="heart"
heart.innerHTML="❤️"
heart.style.left=Math.random()*100+"vw"
heart.style.fontSize=(Math.random()*20+15)+"px"
document.body.appendChild(heart)
setTimeout(()=>heart.remove(),6000)
},400)


function checkName(){

const input=document.getElementById("nickname").value.trim()
const box=document.getElementById("box")

if(input==="nickname"){

document.body.style.background =
"linear-gradient(135deg,#7CFCA5,#4ade80)"

box.classList.add("success")

document.getElementById("message").innerHTML =
"Correct ❤️"

setTimeout(()=>{
window.location.href="memories.html"
},1500)

}else{

box.classList.add("shake")

setTimeout(()=>box.classList.remove("shake"),400)

}

}

</script>

</body>
</html>
