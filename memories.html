<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories ❤️</title>

<style>
body{
  margin:0;
  font-family:'Segoe UI', sans-serif;
  background: #ffe4e1; /* soft pink background */
  color: #333;
  text-align:center;
  padding:40px 20px;
  overflow-x:hidden;
  position:relative;
}

/* Main container */
.container{
  max-width:900px;
  margin:auto;
  text-align:center;
}

/* Titles */
h1{
  font-size:36px;
  color:#ff4d6d;
  margin-bottom:25px;
}

/* Love Letter */
.letter{
  background: #fff0f3;
  border-radius:20px;
  padding:30px;
  max-width:700px;
  margin:20px auto;
  font-size:18px;
  line-height:1.6;
  box-shadow:0 8px 25px rgba(0,0,0,0.2);
  transition:0.3s;
}

/* Polaroid gallery */
.gallery{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
  gap:30px;
  margin-top:40px;
}

.polaroid{
  background:white;
  padding:10px 10px 30px 10px;
  width:220px;
  box-shadow:0 8px 20px rgba(0,0,0,0.25);
  transform:rotate(-2deg);
  transition:0.3s;
}

.polaroid:nth-child(even){
  transform:rotate(2deg);
}

.polaroid:hover{
  transform:scale(1.08) rotate(0deg);
}

.polaroid img{
  width:100%;
  border-radius:10px;
}

.caption{
  color:#333;
  margin-top:10px;
  font-weight:bold;
}

/* Floating hearts */
.heart{
  position:fixed;
  color:#ff4d6d;
  animation: float 6s linear infinite;
}

@keyframes float{
  0%{transform:translateY(100vh)}
  100%{transform:translateY(-10vh)}
}

/* Responsive adjustments */
@media (max-width:480px){
h1{
  font-size:28px;
}
.letter{
  font-size:16px;
  padding:20px;
}
.polaroid{
  width:150px;
}
}
</style>
</head>

<body>

<div class="container">

<h1>Our Best Moments ❤️</h1>

<div class="letter" id="letter"></div>

<div class="gallery"></div>

<script>
let data = null;

/* Load JSON */
fetch('data.json')
  .then(res => res.json())
  .then(json => {
    data = json;

    // Set love letter text
    startTyping(data.lovemessage);

    // Load images dynamically
    loadGallery(data.photos);
  });

/* Typing effect */
function startTyping(text){
  let i = 0;
  function typing(){
    if(i < text.length){
      document.getElementById("letter").innerHTML += text.charAt(i);
      i++;
      setTimeout(typing, 40);
    }
  }
  typing();
}

/* Load gallery images */
function loadGallery(photos){
  const gallery = document.querySelector(".gallery");
  gallery.innerHTML = ""; // clear existing hardcoded images

  photos.forEach(src => {
    const div = document.createElement("div");
    div.className = "polaroid";

    const img = document.createElement("img");
    img.src = src;

    div.appendChild(img);
    gallery.appendChild(div);
  });
}

/* Floating hearts */
setInterval(()=>{
  const heart=document.createElement("div");
  heart.className="heart";
  heart.innerHTML="❤️";
  heart.style.left=Math.random()*100+"vw";
  heart.style.fontSize=(Math.random()*20+15)+"px";
  document.body.appendChild(heart);
  setTimeout(()=>heart.remove(),6000);
},800);
</script>

</body>
</html>
